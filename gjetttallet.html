<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjett tallet</title>
    <link rel="stylesheet" href="css/gjettallet.css">
    
</head>
<body>
<h1>Gjett tallet!</h1>
<p>Gjett et tall mellom 1 og 100</p>
<p>Antall forsøk: <span id="forsok">0</span></p>

<input id="sjekk" type="number">
<button onclick="sjekk()">Gjett</button>

<p id="message"></p>

<button onclick="nyttspill()">Nytt spill</button>
<div><img id="duvant" src="bilder/gjetttallet/duvant.gif" style="display: none; width:300px;">
</div>
<script>
const message = document.getElementById("message")
let fasit = Math.floor(Math.random() * 100) + 1;
let forsok = 0;

function sjekk(){

let Gjett = document.getElementById("sjekk").value;
let message = document.getElementById("message");
forsok+=1;
document.getElementById("forsok").textContent = forsok;

if(Gjett == fasit){
message.textContent = "Riktig! Du gjettet tallet!";
document.getElementById("duvant").style.display = "block";
}
else if(Gjett < fasit){
message.textContent = "For lavt";
}
else{
message.textContent = "For høyt";
}

}
function nyttspill(){

fasit = Math.floor(Math.random() * 100) + 1;

document.getElementById("message").textContent = "";
document.getElementById("sjekk").value = "";
document.getElementById("duvant").style.display = "none";
forsøk = 0;
document.getElementById("forsok").textContent = forsok;
}
</script>

    
</body>
</html>
