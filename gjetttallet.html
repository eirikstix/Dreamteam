<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gjett tallet</title>
    <link rel="stylesheet" href="css/gjettallet.css">
    <style>
        body{
            text-align: center;
            margin-top: 50px;
            font-family: Arial, Helvetica, sans-serif;
        }
        input{
            padding: 10px;
            font-size: 16px;
        }
        button{
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
        }
        
    </style>
</head>
<html>
<body>
    <h1>Gjett tallet!</h1>
<p>Gjett et tall mellom 1 og 100</p>

<input id="guessInput" type="number">
<button onclick="sjekk()">Gjett</button>

<p id="message"></p>

<button onclick="nyttspill()">Nytt spill</button>

<script>

let secretNumber = Math.floor(Math.random() * 100) + 1;

function sjekk(){

let guess = document.getElementById("sjekk").value;
let message = document.getElementById("message");

if(guess == secretNumber){
message.textContent = "Riktig! Du gjettet tallet!";
}
else if(guess < secretNumber){
message.textContent = "For lavt";
}
else{
message.textContent = "For høyt";
}

}
function newGame(){

secretNumber = Math.floor(Math.random() * 100) + 1;

document.getElementById("message").textContent = "";
document.getElementById("sjekk").value = "";

}
</script>

    
</body>
</html>
