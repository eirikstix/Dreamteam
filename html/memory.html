    <title> Memory </title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-auto-rows: 100px;
            gap: 20px;
            border: 1px solid black;
        }

        .grid div {
            border: 1px solid black;
        }

        .card {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card.flipped {
            background-color: lightpink;
        }

    </style>
</head>

<body>
