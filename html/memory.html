        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            grid-auto-rows: 120px;

        }

            border-radius: 10px;
            background-color: rgb(30, 98, 128);
        }

        .card {

        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            overflow: hidden;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card.flipped {
            background-color: lightpink;
        }

        h1 {

            font-weight: 500;
