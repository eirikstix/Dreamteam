<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Memory </title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap');

        .nunito {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background-color: rgb(115, 193, 226);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 130px);
            grid-auto-rows: 130px;
            gap: 10px;
        }

        .grid div {
            border: 3px solid white;
            border-radius: 10px;
            background-color: rgb(30, 98, 128);
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            overflow: hidden;
            border-radius: 10px;
            display: none;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card.flipped img {
            display: block;
        }

        h1 {
            font-family: "Nunito", sans-serif;
            font-weight: 500;
            font-size: 50px;
            color: white;
        }
    </style>
</head>
