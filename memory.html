<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Memory </title>
    <link rel="stylesheet" href="css/memory.css">
</head>

<body>
    <h1> Memory </h1>
    <div class="memorygrid" id="memoryBoard">
        <div class="card">
            <img src="bilder/memory/fugl.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/geit.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/hest.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/hamster.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/hest.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/katt.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/gris.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/sel.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/hamster.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/sel.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/fugl.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/hund.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/katt.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/hund.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/gris.jpg">
        </div>
        <div class="card">
            <img src="bilder/memory/geit.jpg">
        </div>
    </div>
    <div class="container">
        <h2>
            <div> Antall forsøk: </div>
            <div id="teller"> 0 </div>
        </h2>
        <button onclick="nyRunde()"> Ny runde </button>
    </div>

    <script>
        const allCards = document.querySelectorAll(".card")
        console.log(allCards)

        let teller = 0
        const tellerElm = document.getElementById("teller")

        let firstCard = null
        let secondCard = null
        let lock = false

        const boardElm = document.getElementById("memoryBoard");
        // Lager en kopi av lista:
        const allCardsCopy = Array.from(allCards);
        // Suffler den tilfeldig:
        allCardsCopy.sort(() => Math.random() - 0.5)
        // Legger dem ut på bordet:
        allCardsCopy.forEach(card => {
            boardElm.appendChild(card)
        });


        allCards.forEach(card => {
            card.addEventListener("click", function () {

                if (lock) return 
                
                this.classList.add("flipped")

                if (!firstCard) {
                    firstCard = this
                } else {
                    secondCard = this

                    teller += 1 
                    tellerElm.innerHTML = teller
                    sjekkMatch()
                }
            })
        })


        function sjekkMatch() {
            const img1 = firstCard.querySelector("img").src
            const img2 = secondCard.querySelector("img").src

            if (img1 === img2) {
                firstCard = null
                secondCard = null

                sjekkVinner()
            }

            else {
                lock = true;

                setTimeout(() => {
                    firstCard.classList.remove("flipped");
                    secondCard.classList.remove("flipped");
                    firstCard = null;
                    secondCard = null;
                    lock = false;
                }, 800);
            }
        }

        function sjekkVinner() {
            const flippedCards = document.querySelectorAll(".flipped")
            const forsokElm = document.querySelector("h2")

            if (flippedCards.length === 16) {
                forsokElm.innerHTML = "Du vant på " + teller + " forsøk!"
            }
        }

        function nyRunde() {
            location.reload()
        }


    </script>
</body>

</html>
